<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akshat Da Dhaba - Contact Us</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="main-container">
        
        <header class="navbar">
            <div class="brand-section">
                <img src="logo.png" alt="Akshat Da Dhaba Logo" class="logo" />
                <h1 class="brand-name">Akshat Da Dhaba</h1>
            </div>
            
            <nav class="nav-links">
                <ul>
                    <li><a href="home.html" class="links">Home</a></li>
                    <li><a href="about.html" class="links">About</a></li>
                    <li><a href="contact.html" class="links">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="container">
                <section class="menu-section">
                    <div class="item">
                        
                        <div class="leftbox">
                            <div class="itemName"> 
                                <h2>Get in Touch</h2>
                            </div>
                            <div class="Ingredients">
                                <h3>Visit Us</h3>
                                <ul>
                                    <li>123, Foodie Street, Main Market</li>
                                    <li>New Delhi, India - 110001</li>
                                </ul>
                                <br>
                                <h3>Call/Email Us</h3>
                                <ul>
                                    <li><a class = "links" href="tel:+919876543210">📞 +91 98765 43210</a></li>
                                    <li><a class = "links" href="mailto:hello@akshatdadhaba.com">✉️ hello@akshatdadhaba.com</a></li>
                                </ul>
                            </div>
                        </div>

                        <div class="rightbox" style="align-items: flex-start;">
                            <form class="contact-form">
                                <h3>Send us a Message</h3>
                                <input type="text" placeholder="Your Name" required />
                                <input type="email" placeholder="Your Email" required />
                                <textarea rows="5" placeholder="Your Message" required></textarea>
                                <button type="submit">Send Message</button>
                            </form>
                        </div>

                    </div>
                </section>
            </div>
        </main>

        <footer class="footer">
            <div class="footerBox">
                <p>&copy; 2026 Akshat Da Dhaba. All rights reserved.</p>
            </div>
        </footer>
        
    </div>
</body>
</html>
